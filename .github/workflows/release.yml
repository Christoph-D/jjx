name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run unit-test

      - name: Cache jj
        id: cache-jj
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/jj
          key: jj-v0.38.0-${{ runner.os }}-x86_64

      - name: Install jj
        if: steps.cache-jj.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/jj-vcs/jj/releases/download/v0.38.0/jj-v0.38.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/jj.tar.gz
          echo "ed830d9a34a304f8ba258806b52521250a9fffded32ae89c4eb5285b33556a17  /tmp/jj.tar.gz" | sha256sum -c
          tar xz -C /usr/local/bin ./jj -f /tmp/jj.tar.gz

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm exec playwright install

      - name: Playwright tests
        run: pnpm run playwright-test

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: playwright-report/
          retention-days: 30

      - name: Build
        run: pnpm run build

      - name: Package extension
        run: pnpm exec vsce package

      - name: Get version info
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          VSIX_NAME="jjx-${VERSION}.vsix"
          echo "vsix_name=${VSIX_NAME}" >> $GITHUB_OUTPUT

      - name: Extract release notes
        run: |
          awk '/^## /{if(p) exit; p=1; next} p{if(NF || started) print; if(NF) started=1}' CHANGELOG.md > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.vsix_name }}
          body_path: release-notes.md

      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
