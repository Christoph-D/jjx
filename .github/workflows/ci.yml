name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run check-types

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run unit-test

      - name: Cache jj
        id: cache-jj
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/jj
          key: jj-v0.38.0-${{ runner.os }}-x86_64

      - name: Install jj
        if: steps.cache-jj.outputs.cache-hit != 'true'
        run: |
          curl -L https://github.com/jj-vcs/jj/releases/download/v0.38.0/jj-v0.38.0-x86_64-unknown-linux-musl.tar.gz -o /tmp/jj.tar.gz
          echo "ed830d9a34a304f8ba258806b52521250a9fffded32ae89c4eb5285b33556a17  /tmp/jj.tar.gz" | sha256sum -c
          tar xz -C /usr/local/bin ./jj -f /tmp/jj.tar.gz

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: .vscode-test
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm exec playwright install

      - name: Playwright tests
        run: pnpm run playwright-test

      - name: Upload Playwright artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: playwright-report/
          retention-days: 30
