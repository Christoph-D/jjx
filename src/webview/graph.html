<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="${cssUri}">
    <link rel="stylesheet" href="${codiconUri}">
</head>

<body>
    <div id="context-menu" class="context-menu">
        <div class="context-menu-item" data-action="edit">Edit this change</div>
        <div class="context-menu-item" data-action="copyId">Copy change ID</div>
    </div>
    <div id="tooltip" class="tooltip"></div>
    <div id="graph">
        <svg id="connections">
            <defs id="svg-defs"></defs>
            <g id="connection-lines"></g>
            <g id="node-circles"></g>
        </svg>
        <div id="nodes"></div>
    </div>
    <script>
        const vscode = acquireVsCodeApi();
        const rootChangeId = "z".repeat(32);
        const SWIMLANE_WIDTH = 12;
        const CIRCLE_RADIUS = 5;
        let selectedNodes = new Set();
        let tooltipTimeout = null;
        let currentLaneInfo = [];
        let currentChanges = [];

        const colorRegistry = [
            "rgba(from var(--vscode-charts-blue) r g b / 100%)",
            "rgba(from var(--vscode-charts-purple) r g b / 100%)",
            "rgba(from var(--vscode-charts-orange) r g b / 100%)",
            "rgba(from var(--vscode-charts-green) r g b / 100%)",
            "rgba(from var(--vscode-charts-red) r g b / 100%)",
        ];

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.command) {
                case 'updateGraph':
                    selectedNodes.clear();
                    document.querySelectorAll('.change-node').forEach(n => {
                        n.classList.remove('selected', 'highlighted', 'dimmed');
                    });
                    document.querySelectorAll('.node-circle').forEach(circle => {
                        circle.classList.remove('child-node', 'dimmed');
                    });
                    document.querySelectorAll('.connection-line').forEach(line => {
                        line.classList.remove('highlighted', 'dimmed', 'child-connection');
                    });
                    vscode.postMessage({
                        command: 'selectChange',
                        selectedNodes: []
                    });
                    updateGraph(message.changes, message.laneInfo, message.changeEditAction, message.graphStyle, message.preserveScroll);
                    break;
            }
        });

        function getPathBounds(pathData) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            svg.appendChild(path);
            document.body.appendChild(svg);

            const bbox = path.getBBox();

            document.body.removeChild(svg);

            return bbox;
        }

        function getLaneColor(colorIndex) {
            return colorRegistry[colorIndex % colorRegistry.length];
        }

        function getLaneX(laneIndex) {
            return SWIMLANE_WIDTH * (laneIndex + 1);
        }

        function createCircle(change, colorIndex) {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", "node-circle");
            g.style.setProperty('--lane-color', getLaneColor(colorIndex));

            const radius = change.currentWorkingCopy ? 7 : CIRCLE_RADIUS;

            if (change.branchType === "◆") {
                const diamond = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const size = 5;
                const d = `M 0 ${-size} L ${size} 0 L 0 ${size} L ${-size} 0 Z`;
                diamond.setAttribute("d", d);
                diamond.setAttribute("class", "diamond-path");
                g.appendChild(diamond);
            } else {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", "0");
                circle.setAttribute("cy", "0");
                circle.setAttribute("r", radius);

                if (change.branchType === "○") {
                    circle.style.fill = "var(--vscode-editor-background)";
                    circle.setAttribute("stroke-width", "1.5");
                }
                g.appendChild(circle);
            }

            if (change.currentWorkingCopy) {
                const pathData = "M377.406,160.981c-5.083-48.911-31.093-92.52-73.184-122.854C259.004,5.538,200.457-6.936,147.603,4.807  C97.354,15.971,53.256,48.312,26.571,93.491C-0.122,138.731-7.098,192.982,7.436,242.39c7.832,26.66,21.729,51.712,40.15,72.51  c18.594,20.972,41.904,37.722,67.472,48.459c23.579,9.888,48.628,14.797,73.653,14.797c34.128-0.001,68.115-9.121,97.949-27.098  l-21.092-35.081c-40.578,24.451-90.887,28.029-134.652,9.66c-40.283-16.96-71.759-52.383-84.211-94.761  c-11.336-38.595-5.846-81.093,15.125-116.586c20.922-35.467,55.426-60.801,94.622-69.533c41.644-9.225,87.948,0.669,123.857,26.566  c32.502,23.394,52.497,56.769,56.363,93.907c2.515,23.979,0.31,42.891-6.526,56.226c-14.487,28.192-35.526,28.36-43.873,27.132  c-0.283-0.041-0.476-0.082-0.65-0.117c-2.396-3.709-2.091-17.489-1.974-23.473c0.044-2.332,0.084-4.572,0.084-6.664v-112.06h-31.349  c-3.998-3.278-8.225-6.251-12.674-8.921c-17.076-10.159-36.858-15.552-57.255-15.552c-29.078,0-56.408,10.597-76.896,29.824  c-32.537,30.543-42.63,80.689-24.551,122.023c8.578,19.62,23.065,35.901,41.876,47.066c17.611,10.434,38.182,15.972,59.47,15.972  c24.394,0,46.819-6.735,64.858-19.492c1.915-1.342,3.813-2.79,5.626-4.233c6.431,8.805,15.811,14.4,27.464,16.114  c16.149,2.408,32.299-0.259,46.784-7.668c16.453-8.419,29.715-22.311,39.439-41.271C377.209,219.346,380.778,193.46,377.406,160.981  z M242.33,224.538c-0.891,1.283-2.229,2.907-2.961,3.803c-0.599,0.778-1.151,1.46-1.643,2.073  c-3.868,4.982-8.597,9.48-14.113,13.374c-11.26,7.943-25.152,11.964-41.257,11.964c-28.968,0-53.462-14.75-63.846-38.544  c-11.258-25.69-5.071-56.854,15.035-75.692c12.7-11.95,30.538-18.784,48.911-18.784c13.028,0,25.56,3.375,36.268,9.788  c6.831,4.072,12.861,9.337,17.9,15.719c0.497,0.613,1.082,1.322,1.724,2.094c0.952,1.135,2.812,3.438,3.981,5.092V224.538z";
                const bounds = getPathBounds(pathData);

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathData);
                path.setAttribute("class", "heart-path");

                const heartSize = 10;
                const scale = heartSize / bounds.width;
                const translateX = -bounds.x * scale - heartSize / 2;
                const translateY = -bounds.y * scale - heartSize / 2;

                path.setAttribute("transform", `scale(${scale}) translate(${translateX / scale}, ${translateY / scale})`);
                g.appendChild(path);
            }

            return g;
        }

        function createPath(colorIndex, fromId, toId) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('stroke-linecap', 'round');
            path.classList.add('connection-line');
            path.style.stroke = getLaneColor(colorIndex);
            if (fromId) path.dataset.fromId = fromId;
            if (toId) path.dataset.toId = toId;
            return path;
        }

        function updateCirclePositions() {
            const svg = document.getElementById('connections');
            const svgRect = svg.getBoundingClientRect();
            
            document.querySelectorAll('.node-circle').forEach(circle => {
                const changeId = circle.dataset.changeId;
                const nodeLane = parseInt(circle.dataset.nodeLane, 10);
                const node = document.querySelector(`.change-node[data-change-id="${changeId}"]`);
                
                if (!node) return;
                
                const nodeRect = node.getBoundingClientRect();
                const x = getLaneX(nodeLane);
                const y = nodeRect.top - svgRect.top + (nodeRect.height / 2);
                
                circle.setAttribute("transform", `translate(${x}, ${y})`);
            });
        }

        function updateConnections() {
            const connectionLines = document.getElementById('connection-lines');
            connectionLines.innerHTML = '';

            const nodes = document.querySelectorAll('.change-node');
            const svg = document.getElementById('connections');
            const svgRect = svg.getBoundingClientRect();

            // Build ordered list of row Y positions and a map from changeId to Y
            const nodeYPositions = new Map();
            const rowYList = [];
            nodes.forEach(node => {
                const nodeRect = node.getBoundingClientRect();
                const y = nodeRect.top - svgRect.top + (nodeRect.height / 2);
                nodeYPositions.set(node.dataset.changeId, y);
                rowYList.push(y);
            });

            const EDGE_EXTENSION = 40; // fallback extension for first/last rows

            function arcRadius(fromLane, toLane) {
                if (Math.abs(fromLane - toLane) <= 1)
                    return 8;
                else
                    return 12;
            }

            currentLaneInfo.forEach((laneInfo, index) => {
                const change = currentChanges[index];
                if (!change) return;

                const nodeY = nodeYPositions.get(laneInfo.commitId);
                if (nodeY === undefined) return;

                const edges = laneInfo.edges || [];

                // Determine the Y positions of adjacent rows for edge endpoints
                // For the first row, use nodeY instead of extending above to prevent
                // drawing lines/circles above the graph where there's no commit
                const prevY = index > 0 ? rowYList[index - 1] : nodeY;
                const nextY = index < rowYList.length - 1 ? rowYList[index + 1] : nodeY + EDGE_EXTENSION;

                // Midpoints between rows (where curves transition)
                const topMidY = (prevY + nodeY) / 2;
                const bottomMidY = (nodeY + nextY) / 2;

                for (const edge of edges) {
                    const fromX = getLaneX(edge.fromLane);
                    const toX = getLaneX(edge.toLane);

                    if (edge.type === 'incoming') {
                        // Line from previous row's position down to this node
                        const path = createPath(edge.colorIndex, edge.fromId, edge.toId);
                        if (edge.fromLane === edge.toLane) {
                            // Straight vertical into node
                            path.setAttribute('d', `M ${fromX} ${topMidY} V ${nodeY}`);
                        } else {
                            // Curve from input lane column to node column
                            const d = [];
                            const r = arcRadius(edge.fromLane, edge.toLane);
                            const sweepFlag = fromX < toX ? 0 : 1;
                            d.push(`M ${fromX} ${topMidY}`);
                            d.push(`V ${nodeY - r}`);
                            d.push(`A ${r} ${r} 0 0 ${sweepFlag} ${fromX < toX ? fromX + r : fromX - r} ${nodeY}`);
                            if (Math.abs((fromX < toX ? fromX + r : fromX - r) - toX) > 1) {
                                d.push(`H ${toX}`);
                            }
                            path.setAttribute('d', d.join(' '));
                        }
                        connectionLines.appendChild(path);
                    } else if (edge.type === 'outgoing') {
                        // Line from this node down to half-way down to the next row's position
                        const path = createPath(edge.colorIndex, edge.fromId, edge.toId);
                        path.setAttribute('d', `M ${fromX} ${nodeY} V ${bottomMidY}`);
                        connectionLines.appendChild(path);
                    } else if (edge.type === 'merge-outgoing') {
                        // Fork from node to a secondary parent's lane
                        const path = createPath(edge.colorIndex, edge.fromId, edge.toId);
                        const d = [];
                        const r = arcRadius(edge.fromLane, edge.toLane);
                        if (fromX === toX) {
                            // Same column (rare but possible)
                            path.setAttribute('d', `M ${fromX} ${nodeY} V ${bottomMidY}`);
                        } else {
                            const sweepFlag = fromX < toX ? 1 : 0;
                            d.push(`M ${fromX} ${nodeY}`);
                            if (Math.abs(fromX - (fromX < toX ? toX - r : toX + r)) > 1) {
                                d.push(`H ${fromX < toX ? toX - r : toX + r}`);
                            }
                            d.push(`A ${r} ${r} 0 0 ${sweepFlag} ${toX} ${nodeY + r}`);
                            d.push(`V ${nextY}`);
                            path.setAttribute('d', d.join(' '));
                        }
                        connectionLines.appendChild(path);
                    } else if (edge.type === 'passthrough') {
                        const path = createPath(edge.colorIndex, edge.fromId, edge.toId);
                        path.setAttribute('d', `M ${fromX} ${topMidY} V ${bottomMidY}`);
                        connectionLines.appendChild(path);
                    }
                }
            });
        }

        function highlightConnectedNodes(nodeElement, highlight) {
            const nodes = document.querySelectorAll('.change-node');
            const nodeCircles = document.querySelectorAll('#node-circles .node-circle');

            if (highlight) {
                const nodeId = nodeElement.dataset.changeId;
                const parentIds = JSON.parse(nodeElement.dataset.parentIds || '[]');

                const childNodes = Array.from(nodes).filter(node => {
                    const nodeParentIds = JSON.parse(node.dataset.parentIds || '[]');
                    return nodeParentIds.includes(nodeId);
                });
                const childIds = childNodes.map(node => node.dataset.changeId);

                nodes.forEach(node => node.classList.add('dimmed'));
                nodeCircles.forEach(circle => circle.classList.add('dimmed'));
                document.querySelectorAll('.connection-line').forEach(line => line.classList.add('dimmed'));

                nodeElement.classList.remove('dimmed');
                nodeElement.classList.add('highlighted');

                parentIds.forEach(parentId => {
                    const parentNode = document.querySelector(`.change-node[data-change-id="${parentId}"]`);
                    if (parentNode) {
                        parentNode.classList.remove('dimmed');
                        parentNode.classList.add('highlighted');
                    }
                });

                childNodes.forEach(node => {
                    node.classList.remove('dimmed');
                    node.classList.add('highlighted');
                });

                nodeCircles.forEach(circle => {
                    const circleData = circle.dataset.changeId;
                    if (circleData === nodeId || parentIds.includes(circleData) || childIds.includes(circleData)) {
                        circle.classList.remove('dimmed');
                        if (childIds.includes(circleData)) {
                            circle.classList.add('child-node');
                        }
                    }
                });

                const connectedIds = new Set([...parentIds, ...childIds]);
                document.querySelectorAll('.connection-line').forEach(line => {
                    const fromId = line.dataset.fromId;
                    const toId = line.dataset.toId;

                    if ((fromId === nodeId && connectedIds.has(toId)) ||
                        (toId === nodeId && connectedIds.has(fromId))) {
                        line.classList.remove('dimmed');
                        line.classList.add('highlighted');
                        if (childIds.includes(fromId) && toId === nodeId) {
                            line.classList.add('child-connection');
                        }
                    }
                });
            } else {
                nodes.forEach(node => {
                    node.classList.remove('dimmed', 'highlighted');
                });
                nodeCircles.forEach(circle => {
                    circle.classList.remove('dimmed', 'child-node');
                });
                document.querySelectorAll('.connection-line').forEach(line => {
                    line.classList.remove('highlighted', 'dimmed', 'child-connection');
                });
            }
        }

        function showTooltip(nodeElement, e) {
            const tooltip = document.getElementById('tooltip');
            const authorName = nodeElement.dataset.authorName;
            const authorEmail = nodeElement.dataset.authorEmail;
            const authorTimestamp = nodeElement.dataset.authorTimestamp;
            const fullDescription = nodeElement.dataset.fullDescription;
            const filesChanged = parseInt(nodeElement.dataset.filesChanged) || 0;
            const linesAdded = parseInt(nodeElement.dataset.linesAdded) || 0;
            const linesRemoved = parseInt(nodeElement.dataset.linesRemoved) || 0;

            let html = '';
            if (authorName || authorEmail || authorTimestamp) {
                html += `<div class="tooltip-header">`;
                if (authorName) {
                    html += `<span class="tooltip-author">${authorName}</span>`;
                    if (authorEmail) {
                        html += ` <span class="tooltip-email">&lt;${authorEmail}&gt;</span>`;
                    }
                }
                html += `</div>`;
                if (authorTimestamp) {
                    html += `<div class="tooltip-timestamp">${authorTimestamp}</div>`;
                }
            }

            html += `<div class="tooltip-summary">${filesChanged} file${filesChanged !== 1 ? 's' : ''} changed, <span class="tooltip-added">+${linesAdded}</span> <span class="tooltip-removed">-${linesRemoved}</span></div>`;

            if (fullDescription) {
                html += `<div class="tooltip-description">${escapeHtml(fullDescription)}</div>`;
            }

            tooltip.innerHTML = html;
            tooltip.style.display = 'block';
            tooltip.style.left = '-9999px';
            tooltip.style.top = '-9999px';

            requestAnimationFrame(() => {
                const tooltipRect = tooltip.getBoundingClientRect();
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                const offset = 15;
                let left = mouseX + offset;
                let top = mouseY + offset;

                if (left + tooltipRect.width > viewportWidth - 10) {
                    left = mouseX - tooltipRect.width - offset;
                }

                if (top + tooltipRect.height > viewportHeight - 10) {
                    top = mouseY - tooltipRect.height - offset;
                }

                if (top < 10) {
                    top = 10;
                }

                if (left < 10) {
                    left = 10;
                }

                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
            });
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateGraph(changes, laneInfo, changeEditAction, graphStyle, preserveScroll = false) {
            const scrollTop = preserveScroll ?
                (window.scrollY || document.documentElement.scrollTop) : 0;

            currentChanges = changes;
            currentLaneInfo = laneInfo || [];

            const nodesContainer = document.getElementById('nodes');
            const circlesContainer = document.getElementById('node-circles');
            nodesContainer.innerHTML = '';
            circlesContainer.innerHTML = '';

            const graphContainer = document.getElementById('graph');
            if (graphStyle === 'compact') {
                graphContainer.classList.add('compact');
            } else {
                graphContainer.classList.remove('compact');
            }

            let maxLanes = 1;
            currentLaneInfo.forEach(info => {
                maxLanes = Math.max(maxLanes, info.inputLanes.length, info.outputLanes.length);
            });

            const graphWidth = SWIMLANE_WIDTH * (maxLanes + 1);
            document.documentElement.style.setProperty('--graph-width', `${graphWidth}px`);

            const changeToLaneInfo = new Map();
            currentLaneInfo.forEach((info, index) => {
                changeToLaneInfo.set(info.commitId, { ...info, changeIndex: index });
            });

            changes.forEach((change, index) => {
                if (!change.changeId) return;

                const info = changeToLaneInfo.get(change.changeId);
                const nodeLane = info ? info.nodeLane : 0;
                const colorIndex = info ? info.colorIndex : 0;

                const node = document.createElement('div');
                node.className = 'change-node';
                node.dataset.changeId = change.changeId;
                node.dataset.parentIds = JSON.stringify(change.parentChangeIds || []);
                node.dataset.branchType = change.branchType;
                node.dataset.currentWorkingCopy = change.currentWorkingCopy;
                node.dataset.authorName = change.authorName || '';
                node.dataset.authorEmail = change.authorEmail || '';
                node.dataset.authorTimestamp = change.authorTimestamp || '';
                node.dataset.fullDescription = change.fullDescription || '';
                node.dataset.filesChanged = change.filesChanged || 0;
                node.dataset.linesAdded = change.linesAdded || 0;
                node.dataset.linesRemoved = change.linesRemoved || 0;
                node.dataset.mine = change.mine || false;
                node.dataset.nodeLane = nodeLane;

                const textContent = document.createElement('div');
                textContent.className = 'text-content';
                const nodeLabel = document.createElement("div");
                const changeIdPrefix = change.changeIdPrefix;
                const changeIdSuffix = change.changeIdSuffix || "";
                nodeLabel.innerHTML = `<span class="change-id-prefix">${changeIdPrefix}</span><span class="change-id-suffix">${changeIdSuffix}</span> ${change.label}`;
                if (change.bookmarks && change.bookmarks.length > 0) {
                    change.bookmarks.forEach(b => {
                        const pill = document.createElement("span");
                        pill.className = 'bookmark-pill';
                        pill.textContent = b;
                        nodeLabel.appendChild(pill);
                    });
                }
                if (change.tags && change.tags.length > 0) {
                    change.tags.forEach(t => {
                        const pill = document.createElement("span");
                        pill.className = 'tag-pill';
                        pill.textContent = t;
                        nodeLabel.appendChild(pill);
                    });
                }
                if (graphStyle === 'compact' && !change.mine && change.authorName) {
                    const authorSpan = document.createElement("span");
                    authorSpan.className = 'author-subdued';
                    authorSpan.textContent = change.authorName;
                    nodeLabel.appendChild(authorSpan);
                }
                textContent.append(nodeLabel);
                if (graphStyle !== 'compact') {
                    const nodeDescription = document.createElement("div");
                    nodeDescription.className = 'description';
                    nodeDescription.textContent = change.description;
                    textContent.append(nodeDescription);
                }
                node.appendChild(textContent);

                const editButton = document.createElement('button');
                editButton.className = 'edit-button';
                editButton.innerHTML = '<i class="codicon codicon-log-in"></i>';
                editButton.title = changeEditAction === 'new' ? 'Create and edit a new empty change on top' : 'Edit this change';
                editButton.onclick = async (e) => {
                    e.stopPropagation();
                    await vscode.postMessage({
                        command: 'editChange',
                        changeId: change.changeId
                    });
                };

                if (change.currentWorkingCopy || (changeEditAction === 'edit' && change.changeId === rootChangeId)) {
                    editButton.style.display = 'none';
                }
                node.appendChild(editButton);
                nodesContainer.appendChild(node);

                const circle = createCircle(change, colorIndex);
                circle.dataset.changeId = change.changeId;
                circle.dataset.nodeLane = nodeLane;
                circlesContainer.appendChild(circle);

                node.addEventListener('mouseenter', (e) => {
                    highlightConnectedNodes(node, true);
                    if (change.changeId !== rootChangeId) {
                        tooltipTimeout = setTimeout(() => {
                            showTooltip(node, e);
                        }, 500);
                    }
                });

                node.addEventListener('mousemove', (e) => {
                    if (tooltipTimeout) {
                        clearTimeout(tooltipTimeout);
                    }
                    if (change.changeId !== rootChangeId) {
                        tooltipTimeout = setTimeout(() => {
                            showTooltip(node, e);
                        }, 500);
                    }
                });

                node.addEventListener('mouseleave', () => {
                    highlightConnectedNodes(node, false);
                    if (tooltipTimeout) {
                        clearTimeout(tooltipTimeout);
                        tooltipTimeout = null;
                    }
                    hideTooltip();
                });

                node.onclick = (e) => {
                    if (selectedNodes.has(change.changeId)) {
                        selectedNodes.delete(change.changeId);
                        node.classList.remove('selected');
                    } else {
                        selectedNodes.add(change.changeId);
                        node.classList.add('selected');
                    }

                    vscode.postMessage({
                        command: 'selectChange',
                        selectedNodes: Array.from(selectedNodes)
                    });
                };

                node.ondblclick = (e) => {
                    if (change.currentWorkingCopy) {
                        return;
                    }
                    vscode.postMessage({
                        command: 'editChange',
                        changeId: change.changeId
                    });
                };

                node.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (change.changeId === rootChangeId) {
                        return;
                    }
                    const contextMenu = document.getElementById('context-menu');
                    contextMenu.dataset.changeId = change.changeId;
                    const editItem = contextMenu.querySelector('[data-action="edit"]');
                    if (change.currentWorkingCopy) {
                        editItem.style.display = 'none';
                    } else {
                        editItem.style.display = 'block';
                    }
                    contextMenu.style.left = e.pageX + 'px';
                    contextMenu.style.top = e.pageY + 'px';
                    contextMenu.style.display = 'block';
                });
            });

            // Wait for next frame to ensure DOM is updated
            requestAnimationFrame(() => {
                updateConnections();
                updateCirclePositions();
                // Restore scroll position only if we saved it
                if (scrollTop > 0) {
                    window.scrollTo(0, scrollTop);
                }
            });
        }

        document.addEventListener('click', () => {
            const contextMenu = document.getElementById('context-menu');
            contextMenu.style.display = 'none';
        });

        document.getElementById('context-menu').addEventListener('click', (e) => {
            const contextMenu = document.getElementById('context-menu');
            const changeId = contextMenu.dataset.changeId;
            const target = e.target.closest('.context-menu-item');
            if (!target || !changeId || changeId === rootChangeId) {
                return;
            }
            const action = target.dataset.action;
            if (action === 'edit') {
                vscode.postMessage({
                    command: 'editChangeDirect',
                    changeId: changeId
                });
            } else if (action === 'copyId') {
                navigator.clipboard.writeText(changeId);
            }
        });

        // Update the resize handler
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                requestAnimationFrame(() => {
                    updateCirclePositions();
                    updateConnections();
                });
            }, 2);
        });

        window.addEventListener('load', () => {
            vscode.postMessage({ command: 'webviewReady' });
        });
    </script>
</body>

</html>
